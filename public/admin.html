<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懒人备忘提醒系统</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a; --bg-secondary: #1a1a2e; --bg-card: #16213e; --bg-hover: #1f2b47;
            --text-primary: #e0e0e0; --text-secondary: #8892a4; --text-muted: #5a6478;
            --accent: #4361ee; --accent-hover: #3a56d4; --success: #06d6a0; --warning: #ffd166; --danger: #ef476f;
            --border: rgba(255,255,255,0.06); --shadow: 0 8px 32px rgba(0,0,0,0.4); --radius: 16px; --radius-sm: 8px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}

        /* Login */
        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 50%,#16213e 100%);}
        .login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shadow);text-align:center;}
        .login-card .logo-icon{font-size:56px;margin-bottom:16px;}
        .login-card h1{font-size:24px;font-weight:700;margin-bottom:8px;}
        .login-card p{color:var(--text-secondary);margin-bottom:32px;font-size:14px;}
        .login-card input{width:100%;padding:14px 18px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:15px;margin-bottom:16px;outline:none;transition:border-color .3s;}
        .login-card input:focus{border-color:var(--accent);}
        .login-card input::placeholder{color:var(--text-muted);}
        .login-card button{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;}
        .login-card button:hover{background:var(--accent-hover);transform:translateY(-1px);}
        .login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none;}

        /* Layout */
        .dashboard{display:none;}
        .topbar{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
        .topbar-left{display:flex;align-items:center;gap:16px;}
        .topbar-left h2{font-size:18px;font-weight:700;}
        .topbar-left span{color:var(--text-secondary);font-size:13px;}
        .topbar-right{display:flex;align-items:center;gap:8px;}
        .topbar-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;transition:all .3s;white-space:nowrap;}
        .topbar-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
        .topbar-btn.danger:hover{background:rgba(239,71,111,0.1);color:var(--danger);border-color:var(--danger);}
        .main-content{padding:32px;max-width:1400px;margin:0 auto;}

        /* Tabs */
        .tabs{display:flex;gap:4px;margin-bottom:32px;background:var(--bg-secondary);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border);width:fit-content;flex-wrap:wrap;}
        .tab-btn{padding:10px 20px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:14px;font-weight:500;border-radius:6px;transition:all .3s;}
        .tab-btn.active{background:var(--accent);color:white;}
        .tab-btn:hover:not(.active){background:var(--bg-hover);color:var(--text-primary);}
        .tab-content{display:none;}.tab-content.active{display:block;animation:fadeIn .3s ease;}

        /* Stats */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px;}
        .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s;}
        .stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.12);}
        .stat-card .stat-icon{font-size:28px;margin-bottom:12px;}
        .stat-card .stat-value{font-size:32px;font-weight:800;margin-bottom:4px;}
        .stat-card .stat-label{color:var(--text-secondary);font-size:13px;}
        .stat-card.blue .stat-value{color:var(--accent);}
        .stat-card.green .stat-value{color:var(--success);}
        .stat-card.orange .stat-value{color:var(--warning);}
        .stat-card.red .stat-value{color:var(--danger);}

        /* Reminder Cards */
        .reminder-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
        .reminder-toolbar-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
        .add-btn{padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;transition:all .3s;display:flex;align-items:center;gap:6px;}
        .add-btn:hover{background:var(--accent-hover);transform:translateY(-1px);}
        .filter-select,.filter-input{padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;outline:none;}
        .filter-select:focus,.filter-input:focus{border-color:var(--accent);}

        .reminder-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
        .r-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .3s;position:relative;overflow:hidden;}
        .r-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px);box-shadow:var(--shadow);}
        .r-card-status{position:absolute;top:0;left:0;right:0;height:3px;}
        .r-card-status.pending{background:linear-gradient(90deg,var(--accent),#7c3aed);}
        .r-card-status.done{background:linear-gradient(90deg,var(--success),#06b6d4);}
        .r-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;margin-top:4px;}
        .r-card-title{font-size:15px;font-weight:700;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .r-card-badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;white-space:nowrap;margin-left:8px;}
        .r-card-badge.pending{background:rgba(67,97,238,0.15);color:var(--accent);}
        .r-card-badge.done{background:rgba(6,214,160,0.15);color:var(--success);}
        .r-card-content{font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .r-card-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text-muted);margin-bottom:14px;}
        .r-card-meta span{display:flex;align-items:center;gap:4px;}
        .r-card-actions{display:flex;gap:6px;border-top:1px solid var(--border);padding-top:12px;}
        .r-card-actions button{flex:1;padding:6px 0;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;}
        .r-card-actions .btn-edit{background:rgba(255,209,102,0.1);color:var(--warning);}
        .r-card-actions .btn-edit:hover{background:rgba(255,209,102,0.2);}
        .r-card-actions .btn-link{background:rgba(67,97,238,0.1);color:var(--accent);}
        .r-card-actions .btn-link:hover{background:rgba(67,97,238,0.2);}
        .r-card-actions .btn-test{background:rgba(6,214,160,0.1);color:var(--success);}
        .r-card-actions .btn-test:hover{background:rgba(6,214,160,0.2);}
        .r-card-actions .btn-del{background:rgba(239,71,111,0.1);color:var(--danger);}
        .r-card-actions .btn-del:hover{background:rgba(239,71,111,0.2);}
        .no-data{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}

        .pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:24px;}
        .pagination span{color:var(--text-muted);font-size:13px;}
        .page-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;transition:all .2s;}
        .page-btn:hover{background:var(--bg-hover);}.page-btn:disabled{opacity:.4;cursor:not-allowed;}

        /* Modal */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;backdrop-filter:blur(4px);justify-content:center;align-items:flex-start;padding-top:60px;overflow-y:auto;}
        .modal-overlay.show{display:flex;}
        .modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:600px;box-shadow:var(--shadow);animation:fadeIn .3s ease;margin-bottom:40px;}
        .modal-box-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
        .modal-box-header h3{font-size:16px;font-weight:600;}
        .modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s;}
        .modal-close:hover{background:var(--bg-hover);color:var(--text-primary);}
        .modal-box-body{padding:24px;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
        .form-row.full{grid-template-columns:1fr;}
        .form-group{display:flex;flex-direction:column;gap:6px;}
        .form-group label{font-size:13px;color:var(--text-secondary);font-weight:500;}
        .form-group input,.form-group textarea,.form-group select{padding:10px 14px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .3s;font-family:inherit;}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
        .form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-muted);}
        .form-group textarea{resize:vertical;min-height:60px;}
        .quick-times{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
        .qt-btn{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;transition:all .2s;}
        .qt-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(67,97,238,0.08);}
        .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
        .form-btn{padding:10px 24px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;transition:all .3s;}
        .form-btn.primary{background:var(--accent);color:white;}
        .form-btn.primary:hover{background:var(--accent-hover);}
        .form-btn.secondary{background:var(--bg-hover);color:var(--text-secondary);}

        /* Channels */
        .channel-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;}
        .channel-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s;}
        .channel-card:hover{border-color:rgba(255,255,255,0.12);}
        .channel-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .channel-card-header h4{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;}
        .toggle{position:relative;width:48px;height:26px;}
        .toggle input{opacity:0;width:0;height:0;}
        .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--text-muted);transition:.3s;border-radius:26px;}
        .toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:white;transition:.3s;border-radius:50%;}
        .toggle input:checked+.toggle-slider{background:var(--success);}
        .toggle input:checked+.toggle-slider:before{transform:translateX(22px);}
        .channel-field{margin-bottom:16px;}
        .channel-field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
        .channel-field input,.channel-field textarea{width:100%;padding:10px 14px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;outline:none;transition:border-color .3s;font-family:'Courier New',monospace;}
        .channel-field textarea{resize:vertical;min-height:60px;}
        .channel-field input:focus,.channel-field textarea:focus{border-color:var(--accent);}
        .channel-field input::placeholder,.channel-field textarea::placeholder{color:var(--text-muted);}
        .channel-field .hint{font-size:11px;color:var(--text-muted);margin-top:4px;}
        .channel-actions{display:flex;gap:8px;margin-top:20px;}
        .ch-btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all .3s;}
        .ch-btn.save{background:var(--accent);color:white;}.ch-btn.save:hover{background:var(--accent-hover);}
        .ch-btn.test-ch{background:rgba(6,214,160,0.15);color:var(--success);border:1px solid rgba(6,214,160,0.3);}.ch-btn.test-ch:hover{background:rgba(6,214,160,0.25);}
        .channel-status{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:6px;display:none;}
        .channel-status.show{display:block;}.channel-status.ok{background:rgba(6,214,160,0.1);color:var(--success);}.channel-status.err{background:rgba(239,71,111,0.1);color:var(--danger);}

        .section-title{font-size:16px;font-weight:600;margin-bottom:16px;}

        /* Table for logs */
        .table-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
        .table-header{padding:20px 24px;border-bottom:1px solid var(--border);}
        .table-header h3{font-size:16px;font-weight:600;}
        table{width:100%;border-collapse:collapse;}
        th{padding:14px 20px;text-align:left;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);}
        td{padding:14px 20px;font-size:14px;border-bottom:1px solid var(--border);color:var(--text-secondary);}
        tr:hover td{background:var(--bg-hover);}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
        .badge-success{background:rgba(6,214,160,0.15);color:var(--success);}
        .badge-fail{background:rgba(239,71,111,0.15);color:var(--danger);}

        .admin-toast{position:fixed;top:80px;right:20px;z-index:9999;padding:14px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow);transform:translateX(120%);transition:transform .3s ease;}
        .admin-toast.show{transform:translateX(0);}
        .admin-toast.success{background:var(--success);color:#000;}
        .admin-toast.error{background:var(--danger);color:#fff;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        @media(max-width:768px){.main-content{padding:16px;}.topbar{padding:0 12px;}.stats-grid{grid-template-columns:1fr 1fr;}.channel-cards,.reminder-cards{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.modal-box{margin:0 16px;}}
    </style>
</head>
<body>

<div class="login-page" id="loginPage">
    <div class="login-card">
        <div class="logo-icon">🛡️</div>
        <h1>懒人备忘提醒系统</h1>
        <p>登录后管理提醒与通知渠道</p>
        <input type="text" id="loginUsername" placeholder="用户名">
        <input type="password" id="loginPassword" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">登 录</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-left"><h2>📊 懒人备忘提醒系统</h2><span id="welcomeText"></span></div>
        <div class="topbar-right"><button class="topbar-btn danger" onclick="doLogout()">退出登录</button></div>
    </div>
    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" data-tab="reminders" onclick="switchTab('reminders')">📋 提醒管理</button>
            <button class="tab-btn" data-tab="overview" onclick="switchTab('overview')">📊 总览</button>
            <button class="tab-btn" data-tab="channels" onclick="switchTab('channels')">📡 通知渠道</button>
            <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">📜 通知日志</button>
            <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">⚙️ 设置</button>
        </div>

        <!-- Reminders (card view) -->
        <div class="tab-content active" id="tab-reminders">
            <div class="reminder-toolbar">
                <div class="reminder-toolbar-left">
                    <button class="add-btn" onclick="showAddModal()">➕ 添加提醒</button>
                    <input class="filter-input" type="text" id="filterKeyword" placeholder="🔍 搜索..." onkeyup="loadReminders()" style="width:160px;">
                    <select class="filter-select" id="filterStatus" onchange="loadReminders()">
                        <option value="">全部状态</option><option value="0">待提醒</option><option value="1">已完成</option>
                    </select>
                    <select class="filter-select" id="filterCycle" onchange="loadReminders()">
                        <option value="">全部类型</option><option value="once">单次</option><option value="weekly">每周</option><option value="monthly">每月</option><option value="yearly">每年</option>
                    </select>
                </div>
            </div>
            <div class="reminder-cards" id="reminderCards"></div>
            <div class="pagination" id="remindersPagination"></div>
        </div>

        <!-- Overview -->
        <div class="tab-content" id="tab-overview">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- Channels -->
        <div class="tab-content" id="tab-channels">
            <div class="section-title">📡 通知渠道配置</div>
            <p style="color:var(--text-secondary);margin-bottom:24px;font-size:14px;">配置推送渠道，启用后到期提醒会自动推送。</p>
            <div class="channel-cards" id="channelCards"></div>
        </div>

        <!-- Logs -->
        <div class="tab-content" id="tab-logs">
            <div class="table-container">
                <div class="table-header"><h3>📜 通知发送日志</h3></div>
                <div style="overflow-x:auto;">
                    <table><thead><tr><th>提醒标题</th><th>平台</th><th>状态</th><th>时间</th></tr></thead><tbody id="logsTableBody"></tbody></table>
                </div>
                <div class="pagination" id="logsPagination" style="padding:16px 24px;border-top:1px solid var(--border);justify-content:space-between;"></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="tab-content" id="tab-settings">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px;">
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">
                    <div class="section-title">🔐 前台访问密码</div>
                    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">设置前台页面的访问密码，留空则不需要密码。</p>
                    <input type="text" id="frontendPassword" placeholder="前台密码（留空=不需要密码）" style="width:100%;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;margin-bottom:12px;outline:none;font-family:'Courier New',monospace;">
                    <button onclick="saveFrontendPwd()" style="padding:10px 24px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">💾 保存前台密码</button>
                    <div id="frontPwdStatus" style="font-size:12px;margin-top:8px;color:var(--text-muted);"></div>
                </div>
                <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;">
                    <div class="section-title">🔑 修改管理员密码</div>
                    <p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">修改后台管理员的登录密码。</p>
                    <input type="password" id="newPassword" placeholder="输入新密码" style="width:100%;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;margin-bottom:12px;outline:none;">
                    <button onclick="changePassword()" style="padding:10px 24px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">💾 保存管理员密码</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Reminder Modal -->
<div class="modal-overlay" id="addModal">
    <div class="modal-box">
        <div class="modal-box-header"><h3 id="modalTitle">➕ 添加新提醒</h3><button class="modal-close" onclick="closeAddModal()">&times;</button></div>
        <div class="modal-box-body">
            <input type="hidden" id="editId">
            <div class="form-row">
                <div class="form-group"><label>🪪 项目名称</label><input type="text" id="addTitle" placeholder="提醒标题"></div>
                <div class="form-group"><label>🔁 循环类型</label><select id="addCycleType"><option value="once">单次提醒</option><option value="weekly">每周循环</option><option value="monthly">每月循环</option><option value="yearly">每年循环</option></select></div>
            </div>
            <div class="form-row full"><div class="form-group"><label>🔖 项目内容</label><textarea id="addContent" placeholder="提醒内容"></textarea></div></div>
            <div class="form-row full"><div class="form-group"><label>📌 链接地址（可选）</label><input type="url" id="addLink" placeholder="https://example.com"></div></div>
            <div class="form-row full"><div class="form-group"><label>⏰ 提醒时间</label>
                <div class="quick-times">
                    <button type="button" class="qt-btn" onclick="setQT(3)">3分钟后</button><button type="button" class="qt-btn" onclick="setQT(15)">15分钟后</button>
                    <button type="button" class="qt-btn" onclick="setQT(30)">30分钟后</button><button type="button" class="qt-btn" onclick="setQT(60)">1小时后</button>
                    <button type="button" class="qt-btn" onclick="setQT(120)">2小时后</button><button type="button" class="qt-btn" onclick="setTomorrow(9)">明天9点</button>
                    <button type="button" class="qt-btn" onclick="setTomorrow(12)">明天12点</button><button type="button" class="qt-btn" onclick="setDaysLater(7)">7天后</button>
                    <button type="button" class="qt-btn" onclick="setDaysLater(30)">30天后</button>
                </div>
                <input type="datetime-local" id="addRemindTime">
            </div></div>
            <div class="form-row full" id="editStatusRow" style="display:none;"><div class="form-group"><label>📊 状态</label><select id="editStatus"><option value="0">待提醒</option><option value="1">已完成</option></select></div></div>
            <div class="form-actions"><button class="form-btn secondary" onclick="closeAddModal()">取消</button><button class="form-btn primary" id="modalSubmitBtn" onclick="submitReminder()">添加提醒</button></div>
        </div>
    </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script>
let authToken='';
const CYCLE_TEXT={once:'单次提醒',weekly:'每周循环',monthly:'每月循环',yearly:'每年循环'};
const CHANNEL_META={
    telegram:{icon:'✈️',name:'Telegram',fields:[{key:'bot_token',label:'Bot Token',placeholder:'123456:ABC-DEF...',type:'input'},{key:'chat_id',label:'Chat ID',placeholder:'你的 Chat ID',type:'input'}]},
    wecom:{icon:'💬',name:'企业微信',fields:[{key:'webhook_url',label:'Webhook URL',placeholder:'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...',type:'input'}]},
    bark:{icon:'🐕',name:'Bark推送',fields:[{key:'push_url',label:'推送地址',placeholder:'https://push.2sb.org',type:'input'},{key:'key',label:'Bark Key',placeholder:'你的 Bark Key',type:'input'}]},
    feishu:{icon:'🐦',name:'飞书',fields:[{key:'webhook_url',label:'Webhook URL',placeholder:'https://open.feishu.cn/open-apis/bot/v2/hook/...',type:'input'}]},
    dingtalk:{icon:'🔔',name:'钉钉',fields:[{key:'webhook_url',label:'Webhook URL',placeholder:'https://oapi.dingtalk.com/robot/send?access_token=...',type:'input'}]},
    custom_webhook:{icon:'🌐',name:'自定义Webhook',fields:[
        {key:'webhook_url',label:'Webhook URL',placeholder:'https://your-server.com/webhook',type:'input'},
        {key:'method',label:'请求方法',placeholder:'POST',type:'input'},
        {key:'content_type',label:'Content-Type',placeholder:'application/json',type:'input'},
        {key:'body_template',label:'Body 模板',placeholder:'{"text": "{{message}}"}',type:'textarea',hint:'使用 {{message}} 作为消息内容占位符'}
    ]}
};

function H(){return{'Content-Type':'application/json','Authorization':`Basic ${authToken}`};}
function toast(msg,type='success'){const t=document.getElementById('adminToast');t.className=`admin-toast ${type} show`;t.textContent=msg;setTimeout(()=>t.classList.remove('show'),3000);}

async function doLogin(){
    const u=document.getElementById('loginUsername').value,p=document.getElementById('loginPassword').value;
    if(!u||!p){document.getElementById('loginError').style.display='block';document.getElementById('loginError').textContent='请输入用户名和密码';return;}
    try{
        const r=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        if(r.ok){authToken=btoa(`${u}:${p}`);document.getElementById('loginPage').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('welcomeText').textContent=`欢迎, ${u}`;loadReminders();loadStats();loadChannels();loadLogs();loadFrontendPwd();}
        else{document.getElementById('loginError').style.display='block';document.getElementById('loginError').textContent='用户名或密码错误';}
    }catch(e){toast('登录失败','error');}
}
function doLogout(){authToken='';document.getElementById('dashboard').style.display='none';document.getElementById('loginPage').style.display='flex';}
function switchTab(t){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById(`tab-${t}`).classList.add('active');document.querySelector(`.tab-btn[data-tab="${t}"]`).classList.add('active');}

// Stats
async function loadStats(){
    try{const d=await(await fetch('/admin/stats',{headers:H()})).json();
    document.getElementById('statsGrid').innerHTML=`
        <div class="stat-card blue"><div class="stat-icon">📋</div><div class="stat-value">${d.reminders.total}</div><div class="stat-label">总提醒数</div></div>
        <div class="stat-card orange"><div class="stat-icon">⏳</div><div class="stat-value">${d.reminders.pending}</div><div class="stat-label">待提醒</div></div>
        <div class="stat-card green"><div class="stat-icon">✅</div><div class="stat-value">${d.reminders.completed}</div><div class="stat-label">已完成</div></div>
        <div class="stat-card red"><div class="stat-icon">📮</div><div class="stat-value">${d.todayNotifications}</div><div class="stat-label">今日通知</div></div>`;}catch(e){toast('加载统计失败','error');}
}

// Reminders Card View
async function loadReminders(page=1){
    const kw=document.getElementById('filterKeyword').value,st=document.getElementById('filterStatus').value,cy=document.getElementById('filterCycle').value;
    const params=new URLSearchParams({page,pageSize:12});
    if(kw)params.set('keyword',kw);if(st!=='')params.set('status',st);if(cy)params.set('cycle_type',cy);
    try{
        const d=await(await fetch(`/admin/reminders?${params}`,{headers:H()})).json();
        if(!d.reminders.length){document.getElementById('reminderCards').innerHTML='<div class="no-data">📭 暂无提醒，点击"添加提醒"开始</div>';document.getElementById('remindersPagination').innerHTML='';return;}
        document.getElementById('reminderCards').innerHTML=d.reminders.map(r=>{
            const isPending=r.status===0;
            const time=new Date(r.remind_time).toLocaleString('zh-CN');
            return `<div class="r-card">
                <div class="r-card-status ${isPending?'pending':'done'}"></div>
                <div class="r-card-header">
                    <div class="r-card-title">${r.title}</div>
                    <span class="r-card-badge ${isPending?'pending':'done'}">${isPending?'⏳ 待提醒':'✅ 已完成'}</span>
                </div>
                <div class="r-card-content">${r.content}</div>
                <div class="r-card-meta">
                    <span>⏰ ${time}</span>
                    <span>🔁 ${CYCLE_TEXT[r.cycle_type]||r.cycle_type}</span>
                </div>
                <div class="r-card-actions">
                    <button class="btn-edit" onclick='showEditModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✏️ 编辑</button>
                    ${r.link?`<button class="btn-link" onclick="window.open('${r.link}','_blank')">🔗 链接</button>`:''}
                    <button class="btn-test" onclick="testNotify('${r.id}')">📤 测试推送</button>
                    <button class="btn-del" onclick="delReminder('${r.id}')">🗑 删除</button>
                </div>
            </div>`;
        }).join('');
        const tp=Math.ceil(d.total/d.pageSize)||1;
        document.getElementById('remindersPagination').innerHTML=`<button class="page-btn" ${d.page<=1?'disabled':''} onclick="loadReminders(${d.page-1})">上一页</button><span>第${d.page}/${tp}页 共${d.total}条</span><button class="page-btn" ${d.page>=tp?'disabled':''} onclick="loadReminders(${d.page+1})">下一页</button>`;
    }catch(e){toast('加载失败','error');}
}
async function delReminder(id){if(!confirm('确定删除？'))return;await fetch(`/admin/reminders/${id}`,{method:'DELETE',headers:H()});toast('已删除');loadReminders();loadStats();}
async function testNotify(id){const r=await(await fetch(`/admin/reminders/${id}/test-notify`,{method:'POST',headers:H()})).json();toast(r.success?'测试通知已发送！':'发送失败: '+(r.error||'无启用渠道'),r.success?'success':'error');}

// Add / Edit Modal
let editMode=false;
function showAddModal(){
    editMode=false;
    document.getElementById('editId').value='';
    document.getElementById('modalTitle').textContent='➕ 添加新提醒';
    document.getElementById('modalSubmitBtn').textContent='添加提醒';
    document.getElementById('editStatusRow').style.display='none';
    document.getElementById('addModal').classList.add('show');
    document.getElementById('addTitle').focus();
}
function showEditModal(r){
    editMode=true;
    document.getElementById('editId').value=r.id;
    document.getElementById('modalTitle').textContent='✏️ 编辑提醒';
    document.getElementById('modalSubmitBtn').textContent='保存修改';
    document.getElementById('addTitle').value=r.title||'';
    document.getElementById('addContent').value=r.content||'';
    document.getElementById('addCycleType').value=r.cycle_type||'once';
    document.getElementById('addLink').value=r.link||'';
    document.getElementById('addRemindTime').value=fmtDT(new Date(r.remind_time));
    document.getElementById('editStatus').value=String(r.status||0);
    document.getElementById('editStatusRow').style.display='';
    document.getElementById('addModal').classList.add('show');
    document.getElementById('addTitle').focus();
}
function closeAddModal(){document.getElementById('addModal').classList.remove('show');['addTitle','addContent','addLink','addRemindTime','editId'].forEach(id=>document.getElementById(id).value='');document.getElementById('addCycleType').value='once';document.getElementById('editStatusRow').style.display='none';editMode=false;}
function fmtDT(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function setQT(m){document.getElementById('addRemindTime').value=fmtDT(new Date(Date.now()+m*60000));}
function setTomorrow(h){const d=new Date();d.setDate(d.getDate()+1);d.setHours(h,0,0,0);document.getElementById('addRemindTime').value=fmtDT(d);}
function setDaysLater(n){document.getElementById('addRemindTime').value=fmtDT(new Date(Date.now()+n*86400000));}
async function submitReminder(){
    const title=document.getElementById('addTitle').value.trim(),content=document.getElementById('addContent').value.trim(),rt=document.getElementById('addRemindTime').value,ct=document.getElementById('addCycleType').value,link=document.getElementById('addLink').value.trim();
    if(!title){toast('请输入标题','error');return;}if(!content){toast('请输入内容','error');return;}if(!rt){toast('请选择时间','error');return;}
    try{
        if(editMode){
            const id=document.getElementById('editId').value;
            const status=Number(document.getElementById('editStatus').value);
            const r=await fetch(`/admin/reminders/${id}`,{method:'PUT',headers:H(),body:JSON.stringify({title,content,remind_time:new Date(rt).toISOString(),cycle_type:ct,link,status})});
            if(r.ok){toast('✅ 提醒修改成功！');closeAddModal();loadReminders();loadStats();}else toast('修改失败','error');
        }else{
            const r=await fetch('/api/reminders',{method:'POST',headers:H(),body:JSON.stringify({id:Date.now().toString(),title,content,remind_time:new Date(rt).toISOString(),cycle_type:ct,link})});
            if(r.ok){toast('✅ 提醒添加成功！');closeAddModal();loadReminders();loadStats();}else toast('添加失败','error');
        }
    }catch(e){toast(editMode?'修改失败':'添加失败','error');}
}
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

// Channels
async function loadChannels(){
    try{const chs=await(await fetch('/admin/channels',{headers:H()})).json();
    document.getElementById('channelCards').innerHTML=chs.map(ch=>{
        const m=CHANNEL_META[ch.channel_type]||{icon:'📡',name:ch.channel_name,fields:[]};
        let cfg={};try{cfg=JSON.parse(ch.config);}catch{}
        return`<div class="channel-card"><div class="channel-card-header"><h4>${m.icon} ${m.name}</h4>
            <label class="toggle"><input type="checkbox" id="toggle-${ch.channel_type}" ${ch.enabled?'checked':''}><span class="toggle-slider"></span></label></div>
            ${m.fields.map(f=>`<div class="channel-field"><label>${f.label}</label>
                ${f.type==='textarea'?`<textarea id="cfg-${ch.channel_type}-${f.key}" placeholder="${f.placeholder}">${cfg[f.key]||''}</textarea>`
                :`<input type="text" id="cfg-${ch.channel_type}-${f.key}" value="${(cfg[f.key]||'').replace(/"/g,'&quot;')}" placeholder="${f.placeholder}">`}
                ${f.hint?`<div class="hint">${f.hint}</div>`:''}</div>`).join('')}
            <div class="channel-actions"><button class="ch-btn save" onclick="saveChannel('${ch.channel_type}')">💾 保存</button><button class="ch-btn test-ch" onclick="testChannel('${ch.channel_type}')">📤 测试</button></div>
            <div class="channel-status" id="status-${ch.channel_type}"></div></div>`;
    }).join('');}catch(e){toast('加载渠道失败','error');}
}
async function saveChannel(type){
    const m=CHANNEL_META[type],en=document.getElementById(`toggle-${type}`).checked,cfg={};
    for(const f of m.fields){const el=document.getElementById(`cfg-${type}-${f.key}`);cfg[f.key]=el.value.trim();}
    await fetch(`/admin/channels/${type}`,{method:'PUT',headers:H(),body:JSON.stringify({enabled:en,config:cfg})});
    toast(`${m.name} 配置已保存！`);const s=document.getElementById(`status-${type}`);s.className='channel-status show ok';s.textContent='✅ 已保存';setTimeout(()=>s.classList.remove('show'),3000);
}
async function testChannel(type){
    const m=CHANNEL_META[type],s=document.getElementById(`status-${type}`);
    s.className='channel-status show';s.style.background='rgba(67,97,238,0.1)';s.style.color='var(--accent)';s.textContent='⏳ 保存并测试中...';
    const en=document.getElementById(`toggle-${type}`).checked,cfg={};
    for(const f of m.fields){const el=document.getElementById(`cfg-${type}-${f.key}`);cfg[f.key]=el.value.trim();}
    if(!en){s.className='channel-status show err';s.textContent='❌ 请先打开启用开关';return;}
    if(!Object.values(cfg).some(v=>v.length>0)){s.className='channel-status show err';s.textContent='❌ 请先填写配置';return;}
    try{const r=await(await fetch(`/admin/channels/${type}/test`,{method:'POST',headers:H(),body:JSON.stringify({enabled:en,config:cfg})})).json();
    s.className=`channel-status show ${r.success?'ok':'err'}`;s.textContent=r.success?'✅ 测试成功！':`❌ ${r.error||'请检查配置'}`;}
    catch(e){s.className='channel-status show err';s.textContent=`❌ ${e.message}`;}
}

// Logs
async function loadLogs(page=1){
    try{const d=await(await fetch(`/admin/logs?page=${page}&pageSize=20`,{headers:H()})).json();
    document.getElementById('logsTableBody').innerHTML=d.logs.map(l=>`<tr><td style="font-weight:500;color:var(--text-primary);">${l.reminder_title||'-'}</td><td><span class="badge" style="background:rgba(67,97,238,0.15);color:var(--accent);">${l.platform}</span></td><td><span class="badge ${l.success?'badge-success':'badge-fail'}">${l.success?'成功':'失败'}</span></td><td style="white-space:nowrap;">${new Date(l.created_at).toLocaleString('zh-CN')}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">暂无日志</td></tr>';
    const tp=Math.ceil(d.total/d.pageSize)||1;
    document.getElementById('logsPagination').innerHTML=`<span>共${d.total}条 第${d.page}/${tp}页</span><div style="display:flex;gap:8px;"><button class="page-btn" ${d.page<=1?'disabled':''} onclick="loadLogs(${d.page-1})">上一页</button><button class="page-btn" ${d.page>=tp?'disabled':''} onclick="loadLogs(${d.page+1})">下一页</button></div>`;}catch(e){toast('加载日志失败','error');}
}
async function changePassword(){
    const p=document.getElementById('newPassword').value;if(!p||p.length<4){toast('密码至少4位','error');return;}
    const r=await fetch('/admin/change-password',{method:'PUT',headers:H(),body:JSON.stringify({newPassword:p})});
    if(r.ok){toast('管理员密码修改成功');setTimeout(doLogout,2000);}else toast('修改失败','error');
}

// Frontend password
async function loadFrontendPwd(){
    try{const d=await(await fetch('/admin/frontend-password',{headers:H()})).json();
    document.getElementById('frontendPassword').value=d.password||'';
    document.getElementById('frontPwdStatus').textContent=d.password?`当前密码: ${d.password}`:'当前无密码（直接访问）';
    }catch(e){}
}
async function saveFrontendPwd(){
    const p=document.getElementById('frontendPassword').value;
    const r=await fetch('/admin/frontend-password',{method:'PUT',headers:H(),body:JSON.stringify({password:p})});
    if(r.ok){toast('前台密码已保存！');document.getElementById('frontPwdStatus').textContent=p?`当前密码: ${p}`:'当前无密码（直接访问）';
    }else toast('保存失败','error');
}
</script>
</body>
</html>
